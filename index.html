<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <!-- 📱 ESSENCIAL PRA CELULAR -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>💖 Uma surpresa pra você 💖</title>

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      overflow-y: auto;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #ffdde1, #ee9ca7);
      text-align: center;
    }

    .container {
      position: relative;
      z-index: 2;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      max-width: 90%;
      margin: 60px auto 600px;
    }

    h2 {
      font-size: 20px;
    }

    p {
      font-size: 14px;
    }

    input {
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      width: 90%;
      margin-top: 15px;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      background: #ff6b81;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }

    #mensagem {
      margin-top: 20px;
      white-space: pre-line;
      font-size: 15px;
    }

    img {
      width: 100%;
      border-radius: 10px;
      margin-top: 15px;
    }

    .heart {
      position: absolute;
      top: -10px;
      color: red;
      animation: fall linear infinite;
      font-size: 20px;
    }

    @keyframes fall {
      to {
        transform: translateY(100vh);
        opacity: 0;
      }
    }

    /* 💖 Barra adaptada */
    .nav-scroll {
      position: fixed;
      bottom: 20px;
      right: 50%;
      transform: translateX(50%);
      z-index: 999;
      display: flex;
      gap: 15px;
    }

    .nav-scroll button {
      background: rgba(255, 107, 129, 0.9);
      border: none;
      color: white;
      font-size: 18px;
      padding: 15px;
      border-radius: 50%;
      cursor: pointer;
      backdrop-filter: blur(10px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }
  </style>
</head>

<body>

<div class="container">
  <h2>✨ Uma surpresa pra você ✨</h2>
  <p>Digite a palavra mágica 💌</p>

  <input type="text" id="resposta">
  <br>
  <button onclick="verificar()">Desbloquear</button>

  <div id="mensagem"></div>

  <img id="foto" src="foto.jpeg" style="display:none;">
</div>

<!-- 💖 Barra -->
<div class="nav-scroll">
  <button onclick="scrollTopo()">⬆️</button>
  <button onclick="scrollBaixo()">⬇️</button>
</div>

<script>
  const palavraSecreta = "gatosa";

  function digitarTexto(texto, elemento, velocidade = 40) {
    let i = 0;
    elemento.innerHTML = "";

    function escrever() {
      if (i < texto.length) {
        elemento.innerHTML += texto.charAt(i);
        i++;
        setTimeout(escrever, velocidade);
      }
    }

    escrever();
  }

  function verificar() {
    const resposta = document.getElementById("resposta").value.trim().toLowerCase();
    const mensagem = document.getElementById("mensagem");
    const foto = document.getElementById("foto");

    if (resposta === palavraSecreta) {
      const texto = `💖 Amor da minha Vida 💖

Desde que você apareceu, tudo ficou mais leve...
Seu sorriso tem um efeito que nem código nenhum explica...

Você é uma das coisas mais especiais que já me aconteceram 💕
Fico muito feliz em estar comemorando nossa data especial 💖

🌹✨`;

      digitarTexto(texto, mensagem, 50);
      foto.style.display = "block";
    } else {
      mensagem.innerHTML = "😔 Não é essa... tenta de novo 💭";
    }
  }

  function scrollTopo() {
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function scrollBaixo() {
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
  }

  function criarCoracao() {
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML = "💖";

    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    heart.style.fontSize = (Math.random() * 20 + 10) + "px";

    document.body.appendChild(heart);

    setTimeout(() => heart.remove(), 5000);
  }

  setInterval(criarCoracao, 300);
</script>

</body>
</html>
